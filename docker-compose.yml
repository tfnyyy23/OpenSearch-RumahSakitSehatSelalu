version: '3.8'

services:
  # ===========================
  # OpenSearch Node
  # ===========================
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch-node
    environment:
      - cluster.name=rumah-sakit-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      # - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@12345
      # TAMBAHKAN INI
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - rumah-sakit-net
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:Admin@12345 | grep -q cluster_name"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5

  # ===========================
  # OpenSearch Dashboards
  # ===========================
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch-node:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      # OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      # OPENSEARCH_USERNAME: admin
      # OPENSEARCH_PASSWORD: Admin@12345
    depends_on:
      - opensearch
    networks:
      - rumah-sakit-net

  # ===========================
  # Backend QA API
  # ===========================
  qa-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa-backend
    ports:
      - "8000:8000"
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=Admin@12345
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data:ro
    depends_on:
      # opensearch:
      #   condition: service_healthy
      - opensearch
    networks:
      - rumah-sakit-net
    restart: unless-stopped

  # ===========================
  # Frontend (Nginx)
  # ===========================
  qa-frontend:
    image: nginx:alpine
    container_name: qa-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - qa-backend
    networks:
      - rumah-sakit-net

volumes:
  opensearch-data:

networks:
  rumah-sakit-net:
    driver: bridge
